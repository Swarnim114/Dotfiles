# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# Input settings: https://wiki.hyprland.org/Configuring/Variables/\#input
input {
    follow_mouse = 1
    mouse_refocus = true

    # GLOBAL (applies to both mouse + touchpad)
    sensitivity = 0.9
    accel_profile = flat   # or adaptive

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = false
        scroll_factor = 1.0
    }

    kb_layout = us
    kb_options = altgr:super

    float_switch_override_focus = 2
}
