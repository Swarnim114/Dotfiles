plugin {
    hyprtasking {
        # Layout: grid works nicely for Exposé-like thumbnails
        layout = grid

        ### Visual / macOS-like frosted glass ###
        gap_size = 26
        border_size = 6
        bg_color = 0xCC0F1724          # translucent dark tint
        corner_radius = 22             # rounded corners like Mac
        exit_on_hovered = true

        ### Frosted blur + vibrancy (subtle but noticeable) ###
        blur {
            enabled = true
            size = 14
            passes = 4
            brightness = 0.94
            contrast = 0.9
            vibrancy = 0.28
            noise = 0.03
        }

        shadow {
            enabled = true
            range = 36
            offset = "0 8"
            color = 0x44000000
            blur = 28
        }

        ### Gestures (touchpad first) - Mission Control style ###
        gestures {
            enabled = true

            # Open with a three-finger upward gesture (mission control)
            open_fingers = 3
            open_distance = 200
            open_positive = true

            # Move overview with two-finger drag for small repositioning
            move_fingers = 2
            move_distance = 140
        }

        ### Grid: center-focused, uniform thumbnails ###
        grid {
            rows = 3
            cols = 3
            loop = true
            gaps_use_aspect_ratio = true
            animate_arrangement = true
            center_focus = true         # if supported, centers selected tile
        }

        ### Tile styling - slightly larger, scaled thumbnails ###
        tile {
            scale_on_hover = 1.08
            scale_on_select = 1.12
            rounding = 14
            border_on_focus = true
            focused_border_color = 0x99FFFFFF
        }

        ### Animations - springy, Mac-like feel ###
        animation {
            enabled = true

            duration_ms = 200
            easing = spring                # springy motion

            enter_duration_ms = 240
            exit_duration_ms = 180
            enter_easing = cubic_bezier(0.22, 1.0, 0.36, 1.0)
            exit_easing  = cubic_bezier(0.4, 0.0, 0.2, 1.0)

            tile_appear_duration_ms = 160
            tile_appear_easing = easeOutBack

            hover_fade_duration_ms = 120
        }

        ### Pointer behaviour - click to focus, double-click to maximize ###
        pointer {
            highlight_on_hover = true
            highlight_color = 0x66FFFFFF
            click_to_focus = true
            double_click_action = maximize   # if plugin supports it
            click_to_exit = true
        }

        ### Extra polish: dim background windows & subtle vignette ###
        vignette {
            enabled = true
            strength = 0.18
        }

        dim {
            enabled = true
            alpha = 0.38
            animate = true
            fade_ms = 220
        }
    }
}
