# ┃                  Decoration Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# Decoration settings: https://wiki.hyprland.org/Configuring/Variables/\#decoration


general {
    gaps_in = 0
    gaps_out = 0
    float_gaps = 0
    border_size = 0
    col.active_border = rgb(FFFFFF)  # White
    col.inactive_border = rgb(FFFFFF) # Grey
    resize_on_border = true
    allow_tearing = false


}


decoration {
    rounding = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Blur
    # https://wiki.hyprland.org/Configuring/Variables/\#blur
    blur {
        enabled = false
        size = 2
        passes = 2
        xray = false
        new_optimizations = true
    }

    shadow {
        enabled = true

        # Tighter, macOS-like shadow
        range = 18          # smaller = closer to window edge
        render_power = 4   # sharper falloff
        color = 0x88000000 # soft black shadow with alpha
        offset = 0 2       # shadow mostly below window (macOS style)
        scale = 1.0
    }

    # Dimming
    dim_inactive = false
    dim_strength = 0.1
}
