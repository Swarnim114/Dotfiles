# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# ======= Application Launchers =======
bind = SUPER, SPACE, exec, $terminal                 # Terminal
bind = SUPER, RETURN, exec, $browser                 # Browser
bind = SUPER, F, exec, $filemanager                  # File Manager
bind = SUPER SHIFT, F, exec, $term_filemanager       #Terminal  File Manager
bind = SUPER, M, exec, $music                        # Music
bind = SUPER, E, exec, $editor                       # Editor
bind = SUPER, N, exec, $notetaking                   # Notes
bind = SUPER, S, exec , $shell_settings
bind = SUPER SHIFT , T , exec ,  $shell_theme_toggle
bind = SUPER, P, exec, $shell_processlist

bind = Super, D ,  exec, $shell_launcher



bind = SUPER, V, exec, $shell_clipboard
bindr = SUPER SHIFT, V, exec, qs -c noctalia-shell ipc call plugin:clipper toggle
bind = SUPER SHIFT, P, exec, gnome-calculator        # Calculator

bind = SUPER SHIFT , C , exec , code ~/.config/


# ======= System & Power =======
bind = SUPER SHIFT , SPACE, exec, $shell_powermenu #~/.config/rofi/power-menu.sh  # Power Menu
bind = SUPER SHIFT, Q, exec, $shell_lock       # Lock Screen
bind = SUPER CTRL, R, exec, bash -c "pkill waybar; sleep 0.5; waybar &"  # Restart Waybar
bind = SUPER SHIFT, R, exec, pkill qs; $shell_daemon
bind = SUPER SHIFT , W , exec ,~/.config/hypr/scripts/toggleWaybar.sh

# ======= Screenshot =======
bind = SUPER, A, exec, $shell_screenshot_area       # Area Screenshot
bind = SUPER SHIFT, A, exec, $shell_screenshot_full # Fullscreen Screenshot

# ======= Window Actions =======
bind = SUPER, Q, killactive                           # Close Window
# In hyprland.conf — use two separate bind lines for the same key
bind = SUPER, C, togglefloating
bind = SUPER, C, resizeactive, exact 1000 600
bind = SUPER, C, centerwindow                      # Toggle Floating/Tiling
bind = SUPER, W, fullscreen, 0                        # Toggle True Fullscreen
bind = ALT, W, fullscreen, 1                             # Toggle Maximized (with gaps)
bind = SUPER , X, layoutmsg, togglesplit         # Toggle Split
bind = SUPER, slash, workspace, previous              # Previous Workspace
bindm = SUPER, mouse:272, movewindow                  # Drag Window
bindm = SUPER, mouse:273, resizewindow                # Resize with Mouse

# --- Move Focus ---
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER , H, movefocus, l
bind = SUPER , L, movefocus, r
bind = SUPER , K, movefocus, u
bind = SUPER , J, movefocus, d


# --- Move Window ---
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# --- Resize Mode (Submap) ---
bindm = SUPER,Z, resizewindow

# --- Quick Resize (with Mod+Ctrl+Shift) ---
bind = SUPER CTRL SHIFT, right, resizeactive, 15 0
bind = SUPER CTRL SHIFT, left, resizeactive, -15 0
bind = SUPER CTRL SHIFT, up, resizeactive, 0 -15
bind = SUPER CTRL SHIFT, down, resizeactive, 0 15
bind = SUPER CTRL SHIFT, l, resizeactive, 15 0
bind = SUPER CTRL SHIFT, h, resizeactive, -15 0
bind = SUPER CTRL SHIFT, k, resizeactive, 0 -15
bind = SUPER CTRL SHIFT, j, resizeactive, 0 15

# ======= Workspaces =======

# Switch Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Scroll Workspaces
bind = SUPER, PERIOD, workspace, e+1
bind = SUPER, COMMA, workspace, e-1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move Window to Workspace (with switch)
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5
bind = SUPER CTRL, 6, movetoworkspace, 6
bind = SUPER CTRL, 7, movetoworkspace, 7
bind = SUPER CTRL, 8, movetoworkspace, 8
bind = SUPER CTRL, 9, movetoworkspace, 9
bind = SUPER CTRL, 0, movetoworkspace, 10
bind = SUPER CTRL, left, movetoworkspace, -1
bind = SUPER CTRL, right, movetoworkspace, +1

# Move Window to Workspace (silent)
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, 0, movetoworkspacesilent, 10

# Special Workspaces
bind = SUPER, F1, togglespecialworkspace, scratchpad
bind = SUPER ALT SHIFT, F1, movetoworkspacesilent, special:scratchpad

# ======= Multimedia =======
bindl = , Print, exec, $shell_screenshot_full  # Full screen capture > clipboard
bind = Super+Shift, S, global, caelestia:screenshotFreeze  # Capture region (freeze)

bindl = , XF86AudioRaiseVolume, exec, $shell_volume_up
bindl = , XF86AudioLowerVolume, exec, $shell_volume_down
bindl = , XF86AudioMute, exec, $shell_volume_mute
bindl = , XF86AudioMicMute, exec, $shell_mic_mute

# Brightness controls (function keys)
bindl = , XF86MonBrightnessUp, exec, $shell_brightness_up
# You can override the default device for e.g. keyboards by adding the device name to the last param
bindl = , XF86MonBrightnessDown, exec, $shell_brightness_down


binds {
    allow_workspace_cycles = 0
    workspace_back_and_forth = 0
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}


# wallpaper swicher
bindl = SUPER  , B , exec , $shell_wallpaper_next

bind = SUPER, Y, exec, hyprctl keyword decoration:screen_shader ~/.config/hypr/shaders/nightmode.frag

# Reading Mode Toggle (E-ink simulation)
bind = SUPER, R, exec, ~/.config/hypr/scripts/reading-mode/reading-mode.sh

# ======= Clipboard History (Index-based) =======
# SUPER + ALT + [1-9] to copy the Nth item from cliphist
bind = SUPER_ALT, 1, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 1
bind = SUPER_ALT, 2, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 2
bind = SUPER_ALT, 3, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 3
bind = SUPER_ALT, 4, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 4
bind = SUPER_ALT, 5, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 5
bind = SUPER_ALT, 6, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 6
bind = SUPER_ALT, 7, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 7
bind = SUPER_ALT, 8, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 8
bind = SUPER_ALT, 9, exec, ~/.config/hypr/scripts/cliphist-at-index.sh 9
