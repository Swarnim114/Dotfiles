# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Decorations Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/scheme/current.conf



general {
    gaps_in = 6
    gaps_out = 8
    float_gaps = 0
    border_size = 3
    col.active_border = rgb(FFFFFF)  # White
    col.inactive_border = rgb(A9A9A9) # Grey
    resize_on_border = true
    allow_tearing = false
    layout = dwindle

}


# https://wiki.hyprland.org/0.45.0/Configuring/Variables/#decoration

decoration {
    active_opacity = 1
    inactive_opacity = 1
    rounding = 0
    
    # 📌 FIX: This MUST be placed here, as a direct child of 'decoration'

    # https://wiki.hyprland.org/0.45.0/Configuring/Variables/#blur
    blur {
        size = 0
        passes = 0
        xray = false
    }
    
    # https://wiki.hyprland.org/0.45.0/Configuring/Variables/#shadow
    shadow {
        enabled = false
        range = 40
        render_power = 3
        color = 0x66000000
        offset = 0 4
        scale = 1.0
    }
        

}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}


dwindle{
    preserve_split = true
}
